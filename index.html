=<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天的我 📔</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1f3a5f;
    --ink-soft:#7e9bbd;
    --paper:#eef5fc;
    --card:#ffffff;
    --line:#d6e6f5;
    --todo:#3b8fe0;
    --todo-soft:#dcecfb;
    --wish:#5bb4d4;
    --wish-soft:#dcf0f7;
    --gold:#f0b53d;
    --green:#3bae8c;
    --radius:18px;
    --shadow:0 8px 24px rgba(31,58,95,.10);
    font-size:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:"Noto Sans TC",sans-serif;
    color:var(--ink);
    background:var(--paper);
    min-height:100%;
    -webkit-tap-highlight-color:transparent;
  }
  .num{font-family:"Baloo 2","Noto Sans TC",sans-serif;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input{font-family:inherit;}

  /* ---------- 登入畫面 ---------- */
  #loginView{
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:20px;padding:24px;text-align:center;
  }
  .brand{font-size:2rem;font-weight:900;letter-spacing:.02em;}
  .brand .dot{color:var(--todo);}
  .brand-sub{color:var(--ink-soft);font-size:.95rem;max-width:280px;line-height:1.7;}
  .gbtn{
    display:flex;align-items:center;gap:10px;
    background:var(--card);border:1.5px solid var(--line);
    padding:13px 26px;border-radius:999px;font-weight:700;font-size:.98rem;
    box-shadow:var(--shadow);transition:transform .15s ease, box-shadow .15s ease;
  }
  .gbtn:active{transform:scale(.97);}
  .gbtn svg{width:20px;height:20px;}
  #loginErr{color:#d9534f;font-size:.85rem;min-height:1.2em;}

  /* ---------- 邀請碼選擇畫面 ---------- */
  #spaceView{
    min-height:100vh;display:none;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;padding:24px;text-align:center;
  }
  #spaceView.show{display:flex;}
  .space-card{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    padding:28px 24px;max-width:340px;width:100%;display:flex;flex-direction:column;gap:14px;
  }
  .space-title{font-weight:800;font-size:1.15rem;}
  .space-desc{color:var(--ink-soft);font-size:.85rem;line-height:1.6;}
  .seg{display:flex;background:var(--paper);border-radius:999px;padding:4px;gap:4px;}
  .seg button{flex:1;padding:9px 0;border-radius:999px;font-weight:700;font-size:.88rem;color:var(--ink-soft);transition:.2s;}
  .seg button.active{background:var(--ink);color:#fff;}
  .code-input{
    width:100%;padding:14px;border:1.5px solid var(--line);border-radius:12px;
    font-size:1.3rem;text-align:center;letter-spacing:.25em;font-weight:800;
    font-family:"Baloo 2",sans-serif;text-transform:uppercase;
  }
  .code-input:focus{outline:none;border-color:var(--todo);}
  .primary-btn{
    background:var(--ink);color:#fff;padding:13px;border-radius:12px;font-weight:700;font-size:.95rem;
    transition:transform .15s ease;
  }
  .primary-btn:active{transform:scale(.97);}
  .primary-btn:disabled{opacity:.4;}
  .code-display{
    font-family:"Baloo 2",sans-serif;font-size:1.6rem;font-weight:800;letter-spacing:.2em;
    background:var(--todo-soft);color:var(--todo);padding:14px;border-radius:12px;
  }
  #spaceErr{color:#d9534f;font-size:.82rem;min-height:1.2em;}
  .small-link{color:var(--ink-soft);font-size:.82rem;text-decoration:underline;margin-top:4px;}

  /* ---------- 主畫面 ---------- */
  #appView{display:none;min-height:100vh;flex-direction:column;
    max-width:640px;width:100%;margin:0 auto;
    background:var(--card);box-shadow:0 0 40px rgba(44,42,61,.06);}
  #appView.show{display:flex;}

  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 18px 12px;
  }
  .topbar .brand{font-size:1.15rem;}
  .avatar-wrap{position:relative;}
  .avatar{width:36px;height:36px;border-radius:50%;border:2px solid var(--card);box-shadow:var(--shadow);overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.3rem;background:var(--wish-soft);}
  .avatar img{width:100%;height:100%;object-fit:cover;}
  .menu{
    position:absolute;right:0;top:44px;background:var(--card);border-radius:14px;
    box-shadow:var(--shadow);padding:8px;display:none;flex-direction:column;min-width:170px;z-index:30;
  }
  .menu.show{display:flex;}
  .menu button{padding:10px 12px;border-radius:10px;text-align:left;font-size:.88rem;font-weight:600;}
  .menu button:active{background:var(--paper);}
  .menu .code-row{padding:10px 12px;font-size:.78rem;color:var(--ink-soft);border-bottom:1px solid var(--line);margin-bottom:4px;}
  .menu .code-row b{display:block;font-family:"Baloo 2",sans-serif;font-size:1rem;letter-spacing:.15em;color:var(--ink);margin-top:2px;}

  /* 分頁列（膠囊式） */
  .tabs{
    display:flex;gap:4px;margin:0 18px 14px;padding:5px;
    background:#e3eefb;border-radius:99px;
  }
  .tab{
    flex:1;padding:10px 4px;text-align:center;border-radius:99px;
    font-weight:700;font-size:.85rem;color:var(--ink-soft);
    background:transparent;transition:.18s;white-space:nowrap;
  }
  .tab.active{background:var(--card);color:var(--ink);box-shadow:0 2px 8px rgba(31,58,95,.12);}
  .tab:active{transform:scale(.96);}

  .page{display:none;flex:1;padding:6px 18px 60px;overflow-y:auto;}
  .page.show{display:block;}

  /* 清單頁 */
  .list-toggle{display:flex;gap:8px;margin-bottom:16px;}
  .list-toggle button{
    flex:1;padding:12px 0;border-radius:14px;font-weight:800;font-size:.92rem;
    background:var(--card);color:var(--ink-soft);box-shadow:var(--shadow);transition:.2s;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .list-toggle button.active.todo{background:var(--todo);color:#fff;}
  .list-toggle button.active.wish{background:var(--wish);color:#fff;}

  .item-list{display:flex;flex-direction:column;gap:10px;}
  .item{
    display:flex;align-items:center;gap:12px;background:#f4f9fe;
    border:1px solid var(--line);
    padding:13px 14px;border-radius:14px;
    animation:popin .25s ease;
  }
  @keyframes popin{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .check{
    width:24px;height:24px;border-radius:50%;border:2px solid var(--line);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;transition:.2s;
  }
  .item.todo .check{border-color:var(--todo);}
  .item.wish .check{border-color:var(--wish);}
  .item.done .check{background:var(--green);border-color:var(--green);}
  .check svg{width:14px;height:14px;opacity:0;transition:.15s;}
  .item.done .check svg{opacity:1;}
  .item-main{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;}
  .item-main.editable{cursor:pointer;}
  .item-text{font-size:.92rem;line-height:1.4;word-break:break-word;}
  .item.done .item-text{color:var(--ink-soft);text-decoration:line-through;}
  /* 進度條（每月習慣） */
  .goal-wrap{display:flex;align-items:center;gap:8px;}
  .goal-bar{flex:1;height:6px;border-radius:99px;background:#d6e6f5;overflow:hidden;}
  .goal-fill{height:100%;background:var(--todo);border-radius:99px;transition:width .3s ease;}
  .goal-fill.reached{background:var(--green);}
  .goal-text{font-size:.74rem;font-weight:700;color:var(--ink-soft);font-family:"Baloo 2",sans-serif;white-space:nowrap;}
  .goal-text.reached{color:var(--green);}
  .rest-tag{font-size:.68rem;font-weight:700;color:var(--ink-soft);background:var(--paper);border:1px solid var(--line);border-radius:99px;padding:1px 8px;margin-left:4px;}
  .item-del{color:var(--ink-soft);font-size:1.1rem;padding:4px;flex-shrink:0;}
  .empty-state{text-align:center;color:var(--ink-soft);font-size:.85rem;padding:50px 20px;line-height:1.8;}
  .empty-state .em{font-size:2rem;display:block;margin-bottom:8px;}

  /* 日曆頁 */
  /* 看大家 */
  .members-bar{
    background:#f4f9fe;border:1px solid var(--line);border-radius:14px;
    padding:12px 14px;margin-bottom:14px;
  }
  .members-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .members-bar .mtitle{font-size:.85rem;font-weight:800;color:var(--ink);}
  .members-bar .mcount{font-size:.78rem;color:var(--ink-soft);font-weight:700;}
  .members-bar .mlist{display:flex;flex-direction:column;gap:8px;}
  .member{
    display:flex;align-items:center;gap:12px;width:100%;text-align:left;
    background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:10px 12px;
    transition:.15s;cursor:pointer;
  }
  .member:active{transform:scale(.99);}
  .member.active{border-color:var(--todo);background:var(--todo-soft);}
  .member .mavatar{width:42px;height:42px;border-radius:50%;flex-shrink:0;}
  .member img.mavatar{object-fit:cover;}
  .member .emoji-av{display:flex;align-items:center;justify-content:center;font-size:1.5rem;background:var(--wish-soft);}
  .member .emoji-av.fallback{background:var(--wish);color:#fff;font-weight:700;}
  .member .mname{font-size:.95rem;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .member .mtag{font-size:.72rem;color:var(--ink-soft);font-weight:700;background:var(--paper);padding:3px 9px;border-radius:99px;flex-shrink:0;}

  /* 正在看誰的書 橫條 */
  .view-banner{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--todo-soft);border:1px solid var(--todo);border-radius:12px;
    padding:10px 14px;margin:0 18px 14px;font-size:.85rem;color:var(--ink);
  }
  .view-banner b{color:var(--todo);}
  .view-banner button{
    background:var(--ink);color:#fff;border-radius:99px;padding:6px 14px;font-size:.8rem;font-weight:700;flex-shrink:0;
  }
  .view-banner button:active{transform:scale(.96);}
  /* 唯讀打勾（看別人的書） */
  .view-dot{border:2px solid var(--line);color:transparent;font-weight:700;font-size:.8rem;}
  .view-dot.done{background:var(--green);border-color:var(--green);color:#fff;}
  .item.readonly{opacity:.95;}

  /* 編輯個人資料彈窗 */
  .profile-preview{display:flex;justify-content:center;margin-bottom:6px;}
  .avatar-preview{
    width:84px;height:84px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:3rem;background:var(--wish-soft);border:3px solid var(--card);box-shadow:var(--shadow);overflow:hidden;
  }
  .avatar-preview img{width:100%;height:100%;object-fit:cover;}
  .emoji-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
  .emoji-grid button{
    aspect-ratio:1;border-radius:12px;font-size:1.4rem;background:var(--paper);
    border:2px solid transparent;transition:.12s;display:flex;align-items:center;justify-content:center;
  }
  .emoji-grid button.active{border-color:var(--todo);background:var(--todo-soft);}
  .emoji-grid button:active{transform:scale(.92);}
  .upload-btn{
    width:100%;padding:13px;border-radius:12px;background:var(--paper);border:1.5px dashed var(--ink-soft);
    font-weight:700;font-size:.9rem;color:var(--ink);
  }
  .upload-btn:active{transform:scale(.98);}

  /* 小月曆 */
  .mini-cal{
    background:#f4f9fe;border:1px solid var(--line);border-radius:16px;
    padding:12px 14px;margin-bottom:14px;
  }
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin:0 0 10px;}
  .cal-head h2{font-size:.92rem;font-weight:800;}
  .cal-head button{
    width:26px;height:26px;border-radius:7px;background:var(--card);border:1px solid var(--line);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;
  }
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-dow{text-align:center;font-size:.66rem;color:var(--ink-soft);font-weight:700;padding-bottom:2px;}
  .cal-cell{
    aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-size:.72rem;font-weight:600;background:var(--card);border:1px solid transparent;position:relative;color:var(--ink);
    cursor:pointer;
  }
  .cal-cell.empty{background:transparent;}
  .cal-cell.today{outline:2px solid var(--todo);outline-offset:-2px;}
  .cal-cell .dots{display:flex;gap:2px;margin-top:2px;}
  .cal-cell .dot{width:4px;height:4px;border-radius:50%;}
  .dot.todo{background:var(--todo);}
  .dot.wish{background:var(--wish);}
  .cal-cell.selected{background:var(--ink);color:#fff;}

  .day-detail{background:#f4f9fe;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:16px;}
  .day-detail h3{font-size:.95rem;font-weight:800;margin-bottom:10px;}
  .day-detail .dgroup{margin-bottom:12px;}
  .day-detail .dgroup-title{font-size:.78rem;color:var(--ink-soft);font-weight:700;margin-bottom:6px;}
  .day-detail .ditem{
    display:flex;align-items:center;gap:8px;font-size:.86rem;padding:6px 0;
  }
  .day-detail .ditem .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
  .day-detail .ditem.done{color:var(--ink-soft);text-decoration:line-through;}
  .day-empty{color:var(--ink-soft);font-size:.82rem;text-align:center;padding:14px;}

  /* toast */
  /* 新增按鈕 */
  .add-open-btn{
    width:100%;padding:14px;border-radius:14px;background:var(--todo);color:#fff;
    font-size:1rem;font-weight:800;margin-bottom:16px;box-shadow:var(--shadow);transition:.15s;
  }
  .add-open-btn:active{transform:scale(.98);}

  /* 彈窗 */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(31,58,95,.4);
    display:none;align-items:center;justify-content:center;padding:18px;z-index:200;
  }
  .modal-overlay.show{display:flex;}
  .modal{
    background:var(--card);border-radius:22px;padding:22px;width:100%;max-width:420px;
    max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(31,58,95,.25);
    animation:modalin .25s ease;
  }
  @keyframes modalin{from{opacity:0;transform:translateY(20px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}
  .modal-title{font-size:1.1rem;font-weight:900;margin-bottom:16px;}
  .m-input{
    width:100%;padding:13px 14px;border:1.5px solid var(--line);border-radius:12px;
    font-size:.95rem;background:var(--paper);color:var(--ink);
  }
  .m-input:focus{outline:none;border-color:var(--todo);}
  .m-label{font-size:.82rem;font-weight:800;color:var(--ink-soft);margin:16px 0 8px;}
  .seg-pick{display:flex;gap:8px;}
  .seg-opt{
    flex:1;padding:12px 0;border-radius:12px;font-weight:700;font-size:.88rem;
    background:var(--paper);border:1.5px solid var(--line);color:var(--ink-soft);transition:.15s;
  }
  .seg-opt.active{background:var(--todo);border-color:var(--todo);color:#fff;}
  .modal-btns{display:flex;gap:10px;margin-top:22px;}
  .due-row{display:flex;gap:8px;align-items:center;}
  .due-row #mDue{flex:1;}
  .due-clear{padding:11px 14px;border-radius:11px;background:var(--paper);border:1.5px solid var(--line);font-weight:700;font-size:.82rem;color:var(--ink-soft);flex-shrink:0;}
  .due-clear:active{transform:scale(.95);}
  .item-due{font-size:.72rem;color:var(--ink-soft);font-weight:700;}
  .m-cancel{
    flex:1;padding:14px;border-radius:14px;background:var(--paper);border:1.5px solid var(--line);
    font-weight:800;font-size:.95rem;color:var(--ink);
  }
  .m-ok{
    flex:2;padding:14px;border-radius:14px;background:var(--todo);color:#fff;
    font-weight:800;font-size:.95rem;
  }
  .m-cancel:active,.m-ok:active{transform:scale(.98);}

  /* 挑日子小月曆 */
  .picker-cal{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px;}
  .picker-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
  .picker-head span{font-weight:800;font-size:.92rem;}
  .picker-head button{width:30px;height:30px;border-radius:8px;background:var(--card);border:1px solid var(--line);font-weight:700;}
  .picker-head button:active{transform:scale(.92);}
  .picker-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .picker-dow{text-align:center;font-size:.68rem;color:var(--ink-soft);font-weight:700;padding-bottom:2px;}
  .picker-grid .pcell{
    aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;
    font-size:.82rem;font-weight:700;background:var(--card);border:1.5px solid transparent;color:var(--ink);
    cursor:pointer;font-family:"Baloo 2",sans-serif;
  }
  .picker-grid .pcell.empty{background:transparent;cursor:default;}
  .picker-grid .pcell.picked{background:var(--todo);color:#fff;border-color:var(--todo);}
  .picker-grid .pcell:not(.empty):active{transform:scale(.9);}
  .picker-quick{display:flex;gap:8px;margin-top:10px;}
  .picker-quick button{
    flex:1;padding:9px 0;border-radius:10px;font-weight:700;font-size:.8rem;
    background:var(--paper);border:1.5px solid var(--line);color:var(--ink);
  }
  .picker-quick button:active{background:var(--todo-soft);}
  .picker-count{text-align:center;font-weight:800;font-size:.85rem;color:var(--todo);margin-top:10px;font-family:"Baloo 2","Noto Sans TC",sans-serif;}

  /* 我的寵物 */
  .pet-card{
    background:linear-gradient(160deg,#eaf4ff,#f6fbff);
    border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;
  }
  .pet-top{display:flex;align-items:center;gap:14px;}
  .pet-stage{
    width:76px;height:76px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:2.6rem;
    background:var(--card);box-shadow:var(--shadow);animation:petbob 2.4s ease-in-out infinite;
  }
  @keyframes petbob{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
  .pet-info{flex:1;min-width:0;}
  .pet-name{font-size:1rem;font-weight:900;margin-bottom:2px;}
  .pet-stage-name{font-size:.76rem;color:var(--ink-soft);font-weight:700;margin-bottom:7px;}
  .pet-exp-bar{height:8px;border-radius:99px;background:#d6e6f5;overflow:hidden;}
  .pet-exp-fill{height:100%;background:linear-gradient(90deg,var(--todo),var(--wish));border-radius:99px;transition:width .5s ease;}
  .pet-exp-text{font-size:.72rem;color:var(--ink-soft);font-weight:700;margin-top:5px;font-family:"Baloo 2","Noto Sans TC",sans-serif;}
  .pet-hint{
    margin-top:12px;background:var(--card);border-radius:12px;padding:9px 12px;
    font-size:.78rem;color:var(--ink-soft);font-weight:600;text-align:center;
  }
  /* 挑寵物 */
  .pet-pick-title{font-size:.95rem;font-weight:900;text-align:center;margin-bottom:4px;}
  .pet-pick-sub{font-size:.78rem;color:var(--ink-soft);text-align:center;margin-bottom:12px;font-weight:600;}
  .pet-pick-row{display:flex;gap:10px;}
  .pet-opt{
    flex:1;background:var(--card);border:2px solid var(--line);border-radius:14px;
    padding:14px 6px;display:flex;flex-direction:column;align-items:center;gap:5px;transition:.15s;
  }
  .pet-opt:active{transform:scale(.95);}
  .pet-opt .pe{font-size:2rem;}
  .pet-opt .pn{font-size:.8rem;font-weight:800;}

  /* 提醒條 */
  #reminderArea{display:flex;flex-direction:column;gap:8px;margin:0 18px 14px;}
  #reminderArea:empty{margin-bottom:0;}
  .reminder{
    display:flex;align-items:center;gap:8px;border-radius:12px;padding:11px 14px;
    font-size:.85rem;font-weight:700;line-height:1.5;animation:popin .3s ease;
  }
  .reminder.holiday{background:#fff4d6;border:1px solid var(--gold);color:#8a6d1c;}
  .reminder.todo-late{background:#ffe3e0;border:1px solid #e88a7d;color:#a3382c;}

  /* toast */
  #toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:11px 22px;border-radius:999px;font-size:.85rem;font-weight:600;

const $ = (id) => document.getElementById(id);
function toast(msg){
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(toast._tm);
  toast._tm = setTimeout(()=>t.classList.remove("show"), 1800);
}
function genCode(){
  const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; // 避開易混淆字元
  let code = "";
  for(let i=0;i<6;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}
async function genUniqueCode(){
  let code, exists = true, tries = 0;
  while(exists && tries < 20){
    code = genCode();
    const snap = await getDoc(doc(db, "spaces", code));
    exists = snap.exists();
    tries++;
  }
  return code;
}

$("createBtn").onclick = async () => {
  $("createBtn").disabled = true;
  const code = await genUniqueCode();
  await setDoc(doc(db, "spaces", code), {
    createdBy: currentUser.uid,
    createdAt: serverTimestamp(),
    members: [currentUser.uid],

      [currentUser.uid]: {
        name: myProfile.name || "我",

      }

};

$("joinBtn").onclick = async () => {
  const code = $("joinCodeInput").value.trim().toUpperCase();

    $("spaceErr").textContent = "代碼要剛好 6 個字喔";

  const snap = await getDoc(doc(db, "spaces", code));
  if(!snap.exists()){
    $("spaceErr").textContent = "找不到這組代碼，再檢查一下";
    return;
  }
  const data = snap.data();
  const members = data.members || [];
  await updateDoc(doc(db, "spaces", code), {
    members: members.includes(currentUser.uid) ? members : [...members, currentUser.uid],
    [`memberInfo.${currentUser.uid}`]: {
      name: myProfile.name || "我",
      avatar: myProfile.avatar || ""
    }
  });
  await setDoc(doc(db, "users", currentUser.uid), { spaceId: code }, { merge: true });

};

function enterSpace(spaceId){

// ---------- 頭像工具 ----------
// 判斷頭像是照片還是 emoji，產生對應的 HTML
function avatarMarkup(entry, cls){
  const av = (entry && (entry.avatar || entry.photo)) || "";
  const isImg = av.startsWith("data:") || av.startsWith("http");
  if(isImg) return `<img src="${av}" class="${cls}" alt="">`;
  if(av) return `<div class="${cls} emoji-av">${av}</div>`;
  const ch = ((entry && entry.name) || "?")[0] || "?";
  return `<div class="${cls} emoji-av fallback">${esc(ch)}</div>`;
}
// 更新右上角我的頭像
function updateMyAvatar(){
  $("userAvatar").innerHTML = avatarMarkup(myProfile, "");
  const inner = $("userAvatar").firstElementChild;
  if(inner && inner.tagName === "IMG"){ inner.style.width="100%"; inner.style.height="100%"; }
}

// 監聽本子（成員變動時即時更新）
function listenSpace(){
  if(unsubSpace) unsubSpace();
  // 補存自己的名字頭像
  updateDoc(doc(db, "spaces", currentSpaceId), {
    [`memberInfo.${currentUser.uid}`]: {
      name: myProfile.name || "我",
      avatar: myProfile.avatar || ""
    }
  }).catch(()=>{});
  unsubSpace = onSnapshot(doc(db, "spaces", currentSpaceId), (snap) => {
    if(!snap.exists()) return;
    spaceMembers = snap.data().memberInfo || {};
    renderMembers(snap.data());
  });
}

function renderMembers(spaceData){
  const bar = $("membersBar");
  const members = spaceData.members || [];
  const info = spaceData.memberInfo || {};
  let cards = "";
  members.forEach(uid => {
    const m = info[uid] || {};
    const isMe = uid === currentUser.uid;
    const name = m.name || "成員";
    const active = uid === viewingUid ? "active" : "";
    cards += `<button class="member ${active}" data-uid="${uid}" data-name="${esc(name)}">
        ${avatarMarkup(m, "mavatar")}
        <span class="mname">${esc(name)}</span>
        ${isMe ? '<span class="mtag">我</span>' : '<span class="mtag">看他的書</span>'}
      </button>`;
  });
  bar.innerHTML = `
    <div class="members-head"><span class="mtitle">👀 看大家</span><span class="mcount">共 ${members.length} 人</span></div>
    <div class="mlist">${cards}</div>`;

  bar.querySelectorAll(".member").forEach(btn => {
    btn.onclick = () => {
      const uid = btn.dataset.uid;
      const name = uid === currentUser.uid ? (myProfile.name || "我") : btn.dataset.name;
      viewItems(uid, name);
    };
  });
}

// 切換看誰的書
function viewItems(uid, name){
  viewingUid = uid;
  viewingName = name;
  selectedDay = null;
  listenItems();
  document.querySelectorAll("#membersBar .member").forEach(b=>{
    b.classList.toggle("active", b.dataset.uid === uid);
  });

  goToPage("listPage");   // 點了誰就跳去看他的清單
}

// 顯示「正在看誰的書」橫條，並切換能不能編輯
function updateViewBanner(){
  const isMe = viewingUid === currentUser.uid;

const ANIMAL_EMOJIS = ["🐶","🐱","🐭","🐹","🐰","🦊","🐻","🐼","🐨","🐯","🦁","🐮","🐷","🐸","🐵","🐔","🐧","🐦","🦆","🦉","🐴","🦄","🐝","🦋","🐢","🐙","🦖","🐳","🐬","🦈","🐠","🦦"];

// 建立 emoji 選擇格
function buildEmojiGrid(){

  grid.innerHTML = "";

function setPickedAvatar(av){
  pickedAvatar = av;
  // 預覽
  const prev = $("avatarPreview");
  const isImg = av.startsWith("data:") || av.startsWith("http");
  prev.innerHTML = isImg ? `<img src="${av}" alt="">` : av;

// 上傳照片 → 壓小成 data URL
$("uploadBtn").onclick = () => $("fileInput").click();
$("fileInput").onchange = (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      // 壓縮成最大 200px 的正方形 JPEG
      const size = 200;
      const canvas = document.createElement("canvas");
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext("2d");
      // 置中裁切成正方形
      const min = Math.min(img.width, img.height);
      const sx = (img.width - min) / 2;
      const sy = (img.height - min) / 2;
      ctx.drawImage(img, sx, sy, min, min, 0, 0, size, size);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.75);
      setPickedAvatar(dataUrl);
      toast("照片好了 📷");
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  $("fileInput").value = "";
};

$("pSave").onclick = async () => {
  const name = $("pName").value.trim().slice(0, 20) || "我";

    }).catch(()=>{});

  if(viewingUid === currentUser.uid){ viewingName = myProfile.name; }
  $("profileModal").classList.remove("show");
  toast("儲存好了 ✨");
};

const PET_TYPES = {
  cat:    { name:"貓咪", stages:["🥚","🐱","😺","😸","🦁"] },
  dog:    { name:"狗狗", stages:["🥚","🐶","🐕","🦮","🐺"] },
  rabbit: { name:"兔子", stages:["🥚","🐰","🐇","🐇","🦄"] },
};
const STAGE_NAMES = ["蛋寶寶","小寶寶","長大中","大孩子","超進化"];
// 每個階段要幾次打卡
const STAGE_NEED = [0, 3, 10, 25, 50];

// 目前寵物資料（之後會存進 Firebase，現在先放這裡預覽）
let myPet = null;   // { type:"cat", exp: 0 }

// 用打卡總次數算出寵物階段
function petStage(exp){
  let s = 0;
  for(let i=0;i<STAGE_NEED.length;i++){ if(exp >= STAGE_NEED[i]) s = i; }
  return s;
}

function renderPet(){
  const card = $("petCard");
  if(!card) return;
  // 看別人的書時先不顯示寵物
  if(viewingUid !== currentUser.uid){ card.style.display="none"; return; }
  card.style.display = "block";

  // 還沒挑寵物 → 顯示挑選畫面
  if(!myPet){
    card.innerHTML = `
      <div class="pet-pick-title">🥚 挑一隻夥伴吧！</div>
      <div class="pet-pick-sub">每打一次卡，牠就會長大一點</div>
      <div class="pet-pick-row">
        <button class="pet-opt" data-pet="cat"><span class="pe">🐱</span><span class="pn">貓咪</span></button>
        <button class="pet-opt" data-pet="dog"><span class="pe">🐶</span><span class="pn">狗狗</span></button>
        <button class="pet-opt" data-pet="rabbit"><span class="pe">🐰</span><span class="pn">兔子</span></button>
      </div>`;
    card.querySelectorAll(".pet-opt").forEach(btn=>{
      btn.onclick = () => { myPet = { type: btn.dataset.pet, exp: 0 }; renderPet(); toast("夥伴來了 🎉"); };
    });
    return;
  }

  // 已經有寵物 → 顯示成長狀態
  const pet = PET_TYPES[myPet.type];
  const exp = myPet.exp || 0;
  const s = petStage(exp);
  const isMax = s >= STAGE_NEED.length - 1;
  const need = isMax ? STAGE_NEED[s] : STAGE_NEED[s+1];
  const prev = STAGE_NEED[s];
  const pct = isMax ? 100 : Math.round((exp - prev) / (need - prev) * 100);

  card.innerHTML = `
    <div class="pet-top">
      <div class="pet-stage">${pet.stages[s]}</div>
      <div class="pet-info">
        <div class="pet-name">我的${esc(pet.name)}</div>
        <div class="pet-stage-name">${STAGE_NAMES[s]} ・ 打卡 ${exp} 次</div>
        <div class="pet-exp-bar"><div class="pet-exp-fill" style="width:${pct}%"></div></div>
        <div class="pet-exp-text">${isMax ? "已經最強了 👑" : `再打 ${need - exp} 次卡就會長大`}</div>
      </div>
    </div>
    <div class="pet-hint">${isMax ? "你的夥伴超強的！" : "完成今天的事，餵養你的夥伴 🍖"}</div>`;
}

// ----- 挑日子月曆 -----
const PICK_DOW = ["日","一","二","三","四","五","六"];
function buildDayPicker(){
  const y = pickerDate.getFullYear(), mo = pickerDate.getMonth();
  $("pickMonthLabel").textContent = `${y}年${mo+1}月`;
  const startW = new Date(y, mo, 1).getDay();
  const days = new Date(y, mo+1, 0).getDate();
  const grid = $("pickerGrid");
  grid.innerHTML = "";
  PICK_DOW.forEach(d=>{
    const el=document.createElement("div"); el.className="picker-dow"; el.textContent=d; grid.appendChild(el);
  });
  for(let i=0;i<startW;i++){
    const el=document.createElement("div"); el.className="pcell empty"; grid.appendChild(el);
  }
  for(let d=1; d<=days; d++){
    const key = `${y}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const el=document.createElement("div");
    el.className = "pcell" + (pickedDays.has(key) ? " picked" : "");
    el.textContent = d;
    el.onclick = () => {
      if(pickedDays.has(key)) pickedDays.delete(key);
      else pickedDays.add(key);
      buildDayPicker();
    };
    grid.appendChild(el);
  }
  $("pickerCount").textContent = `已選 ${pickedDays.size} 天`;
}
$("pickPrev").onclick = () => { pickerDate.setMonth(pickerDate.getMonth()-1); buildDayPicker(); };
$("pickNext").onclick = () => { pickerDate.setMonth(pickerDate.getMonth()+1); buildDayPicker(); };
// 平日/假日全選、清空（只動目前顯示的月份）
$("pickWeekdays").onclick = () => fillMonth(d => d>=1 && d<=5);
$("pickWeekends").onclick = () => fillMonth(d => d===0 || d===6);
$("pickClear").onclick = () => {
  const y=pickerDate.getFullYear(), mo=pickerDate.getMonth();
  const prefix = `${y}-${String(mo+1).padStart(2,"0")}-`;
  [...pickedDays].forEach(k=>{ if(k.startsWith(prefix)) pickedDays.delete(k); });
  buildDayPicker();
};
function fillMonth(test){
  const y=pickerDate.getFullYear(), mo=pickerDate.getMonth();
  const days=new Date(y,mo+1,0).getDate();
  for(let d=1; d<=days; d++){
    const wd=new Date(y,mo,d).getDay();
    if(test(wd)) pickedDays.add(`${y}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`);
  }
  buildDayPicker();
}

$("mCreate").onclick = async () => {
  const text = $("mText").value.trim();
  if(!text){ $("mText").focus(); return; }

  let targetDays = [];
  if(modalType === "habit"){
    targetDays = [...pickedDays].sort();
    if(targetDays.length === 0){
      toast("先挑這個月哪幾天要做 📅");
      return;
    }
  }
  const dueTime = $("mDue").value || "";   // 幾點前要做完（空 = 沒設）

  $("mCreate").disabled = true;
  try{
    if(editingId){
      // 編輯：更新原本那一筆（保留打卡記錄）
      await updateDoc(doc(db, "users", currentUser.uid, "items", editingId), {
        text,
        goal: targetDays.length,
        targetDays,
        dueTime
      });
      closeAddModal();
      toast("改好了 ✨");
    }else{
      // 新增
      await addDoc(collection(db, "users", currentUser.uid, "items"), {
        text, type: activeList, done: false,
        goal: targetDays.length,   // 要做幾天（0 = 一次性）
        targetDays,                // 這個月要做的日子
        dueTime,                   // 幾點前要做完

        createdAt: serverTimestamp(),
        doneAt: null
      });

      toast("新增好了 ✨");

    console.error(err);
    toast("錯誤：" + (err.code || err.message || err));
  }finally{
    $("mCreate").disabled = false;
  }
}

// 今天的日期字串
function todayKey(){ return ymd(new Date()); }
// 這件事這個月打了幾次卡（舊資料用）
function monthCount(item, year, month){
  if(!item.checkins) return 0;
  const prefix = `${year}-${String(month+1).padStart(2,"0")}`;
  return Object.keys(item.checkins).filter(k => k.startsWith(prefix) && item.checkins[k]).length;
}
// 習慣進度：做了幾天 / 要做幾天（挑日子模式）
function habitProgress(item){
  if(item.targetDays && item.targetDays.length){
    const td = item.targetDays;
    const done = td.filter(d => item.checkins && item.checkins[d]).length;
    return { done, total: td.length, unit: "天" };
  }
  // 舊資料：用每月次數
  const now = new Date();
  return { done: monthCount(item, now.getFullYear(), now.getMonth()), total: item.goal, unit: (item.unit||"次") };
}
// 今天是不是「要做的日子」
function isTargetToday(item){
  if(item.targetDays && item.targetDays.length) return item.targetDays.includes(todayKey());
  return true; // 舊資料：每天都可以做
}

function listenItems(){

  const who = viewingUid || currentUser.uid;

    snap.forEach(d => allItems.push({ id:d.id, ...d.data() }));
    renderItems();
    renderCalendar();
    renderReminders();
    renderPet();
    if(selectedDay) renderDayDetail(selectedDay);
  });
}

function renderItems(){
  const list = $("itemList");
  const isMe = viewingUid === currentUser.uid;
  const filtered = allItems.filter(i => i.type === activeList);
  if(filtered.length === 0){
    const who = isMe ? "" : `${esc(viewingName)} `;
    const emptyMsg = isMe
      ? (activeList==="todo"?"還沒有要做的事，新增一件吧":"還沒有想做的事，新增一個願望吧")
      : `${who}這本還沒有${activeList==="todo"?"要做的事":"想做的事"}`;
    list.innerHTML = `<div class="empty-state"><span class="em">${activeList==="todo"?"📌":"⭐"}</span>${emptyMsg}</div>`;
    return;
  }
  const now = new Date();
  const tKey = todayKey();
  // 排序：今天還要做的排上面；做完了或今天是休息日的沉到下面
  const isDoneNow = (item) => {
    if(item.goal && item.goal > 0){
      if(!isTargetToday(item)) return true;            // 今天是休息日 → 沉下去
      return !!(item.checkins && item.checkins[tKey]); // 今天打卡了 → 沉下去
    }
    return !!item.done;
  };
  filtered.sort((a, b) => (isDoneNow(a) ? 1 : 0) - (isDoneNow(b) ? 1 : 0));
  list.innerHTML = "";
  filtered.forEach(item => {
    const isHabit = item.goal && item.goal > 0;
    let checkedNow, mainHtml;

    if(isHabit){
      // 習慣模式：看今天有沒有打卡
      checkedNow = !!(item.checkins && item.checkins[tKey]);
      const { done, total, unit } = habitProgress(item);
      const pct = total > 0 ? Math.min(100, Math.round(done / total * 100)) : 0;
      const reached = total > 0 && done >= total;
      const restToday = !isTargetToday(item);
      const restTag = restToday ? ' <span class="rest-tag">今天休息</span>' : '';
      mainHtml = `
        <div class="item-text">${esc(item.text)}${restTag}</div>
        ${item.dueTime ? `<div class="item-due">⏰ ${esc(item.dueTime)} 前</div>` : ''}
        <div class="goal-wrap">
          <div class="goal-bar"><div class="goal-fill ${reached?'reached':''}" style="width:${pct}%"></div></div>
          <div class="goal-text ${reached?'reached':''}">${done}/${total}${esc(unit)}${reached?' 🎉':''}</div>
        </div>`;
    }else{
      // 簡單模式：一次性完成
      checkedNow = !!item.done;
      mainHtml = `<div class="item-text">${esc(item.text)}</div>${item.dueTime ? `<div class="item-due">⏰ ${esc(item.dueTime)} 前</div>` : ''}`;
    }

    const div = document.createElement("div");
    div.className = `item ${item.type} ${checkedNow ? "done":""} ${isMe?"":"readonly"}`;
    // 看別人的書：不顯示打勾跟刪除按鈕（只能看）
    const checkBtn = isMe
      ? `<button class="check" data-id="${item.id}" data-habit="${isHabit}" data-checked="${checkedNow}">
           <svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
         </button>`
      : `<div class="check view-dot ${checkedNow?'done':''}">${checkedNow?'✓':''}</div>`;
    const delBtn = isMe ? `<button class="item-del" data-del="${item.id}">🗑️</button>` : "";
    const mainCls = isMe ? "item-main editable" : "item-main";
    const editAttr = isMe ? ` data-edit="${item.id}"` : "";
    div.innerHTML = `${checkBtn}<div class="${mainCls}"${editAttr}>${mainHtml}</div>${delBtn}`;
    list.appendChild(div);
  });

  if(!isMe) return; // 看別人的書，不綁定編輯事件

  list.querySelectorAll(".check").forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.id;
      const isHabit = btn.dataset.habit === "true";
      const checked = btn.dataset.checked === "true";
      const ref = doc(db, "users", currentUser.uid, "items", id);
      if(isHabit){
        // 今天打卡 / 取消打卡
        const tKey2 = todayKey();
        if(checked){
          await updateDoc(ref, { [`checkins.${tKey2}`]: deleteField() });
        }else{
          await updateDoc(ref, { [`checkins.${tKey2}`]: true });
          toast("今天打卡 ✅");
        }
      }else{
        await updateDoc(ref, {
          done: !checked,
          doneAt: !checked ? serverTimestamp() : null
        });
      }
    };
  });
  list.querySelectorAll("[data-del]").forEach(btn => {
    btn.onclick = async () => {
      await deleteDoc(doc(db, "users", currentUser.uid, "items", btn.dataset.del));
      toast("刪掉了");
    };
  });
  // 點文字區 → 編輯
  list.querySelectorAll("[data-edit]").forEach(el => {
    el.onclick = () => {
      const item = allItems.find(i => i.id === el.dataset.edit);
      if(item) openEditModal(item);
    };
  });
}

function ymd(date){
  return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;
}

// ---------- 提醒功能 ----------
// 2026 台灣國定假日（放假日）
const HOLIDAYS_2026 = {
  "2026-01-01":"元旦",
  "2026-02-14":"小年夜",
  "2026-02-15":"除夕",
  "2026-02-16":"春節",
  "2026-02-17":"春節",
  "2026-02-18":"春節",
  "2026-02-28":"和平紀念日",
  "2026-04-03":"兒童節",
  "2026-04-04":"清明節",
  "2026-04-05":"清明節",
  "2026-05-01":"勞動節",
  "2026-06-19":"端午節",
  "2026-09-25":"中秋節",
  "2026-10-10":"國慶日",
};
// 這天是不是放假（六、日、或國定假日）
function isHoliday(date){
  const wd = date.getDay();
  if(wd === 0 || wd === 6) return true;          // 週六、週日
  if(HOLIDAYS_2026[ymd(date)]) return true;      // 國定假日
  return false;
}
// 明天放假的話，回傳放假名稱（給提醒用）
function tomorrowHolidayName(){
  const tmr = new Date();
  tmr.setDate(tmr.getDate() + 1);
  if(!isHoliday(tmr)) return null;
  const named = HOLIDAYS_2026[ymd(tmr)];
  if(named) return named;
  const wd = tmr.getDay();
  if(wd === 6) return "星期六";
  if(wd === 0) return "星期日";
  return "放假";
}

// 畫提醒條（放假提醒 + 未完成提醒）
function renderReminders(){
  const area = $("reminderArea");
  if(!area) return;
  // 只在看自己的書時提醒
  if(viewingUid !== currentUser.uid){ area.innerHTML = ""; return; }
  let html = "";

  // 1) 放假前一天提醒
  const holi = tomorrowHolidayName();
  if(holi){
    html += `<div class="reminder holiday">🎉 明天放假（${esc(holi)}）～今天的事記得做完喔！</div>`;
  }

  // 2) 過了時間還沒做完的提醒
  const now = new Date();
  const nowMin = now.getHours()*60 + now.getMinutes();
  const tKey = todayKey();
  const late = [];
  allItems.forEach(item => {
    if(!item.dueTime) return;                       // 沒設時間就跳過
    if(!isTargetToday(item)) return;                // 今天不用做就跳過
    const [h,m] = item.dueTime.split(":").map(Number);
    const dueMin = h*60 + m;
    const isHabit = item.goal && item.goal > 0;
    const doneToday = isHabit ? (item.checkins && item.checkins[tKey]) : item.done;
    if(nowMin > dueMin && !doneToday) late.push(item.text);
  });
  late.forEach(t => {
    html += `<div class="reminder todo-late">⏰ 「${esc(t)}」還沒做喔</div>`;
  });

  area.innerHTML = html;
}

// 建立「每一天有沒有事」的表
function buildDayMap(){
  const map = {};
  const mark = (key, type) => {
    if(!key) return;
    if(!map[key]) map[key] = { todo:false, wish:false };
    map[key][type] = true;
  };
  allItems.forEach(item => {
    // 習慣：每個打卡日都算
    if(item.checkins){
      Object.keys(item.checkins).forEach(k => { if(item.checkins[k]) mark(k, item.type); });
    }
    // 一次性完成：用完成日期
    if((!item.goal || item.goal === 0) && item.done && item.doneAt && item.doneAt.toDate){
      mark(ymd(item.doneAt.toDate()), item.type);
    }
  });
  return map;
}

// 某一天有打卡或完成的項目
function itemsOnDay(key){
  return allItems.filter(item => {
    if(item.checkins && item.checkins[key]) return true;
    if((!item.goal || item.goal === 0) && item.done && item.doneAt && item.doneAt.toDate && ymd(item.doneAt.toDate()) === key) return true;
    return false;
  });
}

function renderCalendar(){
  const year = calDate.getFullYear();
  const month = calDate.getMonth();
  $("calMonthLabel").textContent = `${year}年${month+1}月`;

  const firstDay = new Date(year, month, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const todayKey = ymd(new Date());

  // 統計每天有什麼
  const dayMap = buildDayMap();

  const grid = $("calGrid");
  grid.innerHTML = "";
  DOW.forEach(d => {
    const el = document.createElement("div");
    el.className = "cal-dow";
    el.textContent = d;
    grid.appendChild(el);
  });
  for(let i=0;i<startWeekday;i++){
    const el = document.createElement("div");
    el.className = "cal-cell empty";
    grid.appendChild(el);
  }
  for(let d=1; d<=daysInMonth; d++){
    const cellDate = new Date(year, month, d);
    const key = ymd(cellDate);
    const cell = document.createElement("div");
    cell.className = "cal-cell";
    if(key === todayKey) cell.classList.add("today");
    if(key === selectedDay) cell.classList.add("selected");
    let dotsHtml = "";
    if(dayMap[key]){
      dotsHtml = `<div class="dots">${dayMap[key].todo?'<span class="dot todo"></span>':''}${dayMap[key].wish?'<span class="dot wish"></span>':''}</div>`;
    }
    cell.innerHTML = `<span>${d}</span>${dotsHtml}`;
    cell.onclick = () => {
      selectedDay = key;
      renderCalendar();
      renderDayDetail(key);
    };
    grid.appendChild(cell);
  }

  if(!selectedDay){
    selectedDay = todayKey;
    renderDayDetail(todayKey);
  }
}

function renderDayDetail(key){
  const detail = $("dayDetail");
  const dayItems = itemsOnDay(key);
  const dateObj = new Date(key + "T00:00:00");
  const label = `${dateObj.getMonth()+1}月${dateObj.getDate()}日`;

  if(dayItems.length === 0){
    detail.innerHTML = `<h3>${label}</h3><div class="day-empty">這天還沒有紀錄</div>`;
    return;
  }
  const todos = dayItems.filter(i=>i.type==="todo");
  const wishes = dayItems.filter(i=>i.type==="wish");

  let html = `<h3>${label}</h3>`;
  if(todos.length){
    html += `<div class="dgroup"><div class="dgroup-title">📌 要做的事</div>`;
    todos.forEach(i => {
      html += `<div class="ditem done"><span class="dot todo"></span>${esc(i.text)}</div>`;
    });
    html += `</div>`;
  }
  if(wishes.length){
    html += `<div class="dgroup"><div class="dgroup-title">⭐ 想做的事</div>`;
    wishes.forEach(i => {
      html += `<div class="ditem done"><span class="dot wish"></span>${esc(i.text)}</div>`;
    });
    html += `</div>`;
  }
  detail.innerHTML = html;
}

</script>
</body>
</html>
