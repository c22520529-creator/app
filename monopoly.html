<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>倉鼠大富翁 🎲</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#6b4a32; --ink-soft:#b79c85; --paper:#fdf6ea; --card:#fffdf8;
  --line:#f0e2cd; --todo:#e8a54f; --green:#8aa96a; --blue:#7fa8dd;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Noto Sans TC",sans-serif;color:var(--ink);background:var(--paper);
  -webkit-tap-highlight-color:transparent;padding:12px;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
.num{font-family:"Baloo 2","Noto Sans TC",sans-serif;}
.wrap{max-width:640px;margin:0 auto;}

/* 頂部 */
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.title{font-size:1.15rem;font-weight:900;}
.back{background:var(--card);border:1.5px solid var(--line);border-radius:99px;
  padding:7px 14px;font-size:.82rem;font-weight:700;}

/* 開始畫面 */
.setup{background:var(--card);border:1.5px solid var(--line);border-radius:18px;padding:20px;text-align:center;}
.setup h2{font-size:1.05rem;margin-bottom:6px;}
.setup .sub{font-size:.82rem;color:var(--ink-soft);font-weight:600;margin-bottom:16px;}
.count-row{display:flex;gap:8px;justify-content:center;margin-bottom:18px;}
.count-btn{flex:1;max-width:80px;padding:12px 0;border-radius:12px;background:var(--paper);
  border:2px solid var(--line);font-weight:800;transition:.15s;}
.count-btn.on{background:var(--todo);border-color:var(--todo);color:#fff;}
.pick-label{font-size:.85rem;font-weight:800;margin-bottom:10px;}
.pawn-pick{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
.pawn-opt{background:var(--paper);border:2px solid var(--line);border-radius:14px;
  padding:8px 4px;transition:.15s;position:relative;}
.pawn-opt img{width:100%;max-width:62px;}
.pawn-opt .tag{display:block;font-size:.72rem;font-weight:800;margin-top:2px;min-height:1.1em;color:var(--todo);}
.pawn-opt.taken{border-color:var(--todo);background:#fceedb;}
.pawn-opt.dim{opacity:.45;}
.start-btn{width:100%;padding:14px;border-radius:14px;background:var(--todo);color:#fff;
  font-weight:900;font-size:1rem;}
.start-btn:disabled{background:var(--line);color:var(--ink-soft);}

/* 遊戲畫面 */
.game{display:none;}
.game.show{display:block;}
.board-wrap{position:relative;width:100%;aspect-ratio:1;border-radius:16px;overflow:hidden;
  box-shadow:0 6px 20px rgba(107,74,50,.14);}
.board-wrap img.bg{width:100%;height:100%;display:block;}
.pawn{position:absolute;width:8%;transform:translate(-50%,-60%);
  transition:left .28s ease, top .28s ease;z-index:5;
  filter:drop-shadow(0 2px 3px rgba(107,74,50,.35));}

/* 玩家列 */
.players{display:flex;gap:6px;margin:12px 0;flex-wrap:wrap;}
.pl{flex:1;min-width:110px;background:var(--card);border:1.5px solid var(--line);
  border-radius:12px;padding:8px;display:flex;align-items:center;gap:7px;}
.pl.now{border-color:var(--todo);background:#fceedb;}
.pl img{width:30px;flex-shrink:0;}
.pl .info{min-width:0;}
.pl .nm{font-size:.78rem;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pl .mn{font-size:.8rem;font-weight:800;color:var(--todo);font-family:"Baloo 2",sans-serif;}

/* 控制區 */
.ctrl{background:var(--card);border:1.5px solid var(--line);border-radius:16px;
  padding:14px;text-align:center;}
.turn-txt{font-size:.9rem;font-weight:800;margin-bottom:10px;}
.dice-area{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px;}
.die{position:relative;width:82px;}
.die img{width:100%;display:block;}
.die .patch{position:absolute;left:32%;top:57%;transform:translate(-50%,-50%);
  width:26%;height:20%;background:#cddcf1;border-radius:4px;}
.die .val{position:absolute;left:32%;top:57%;transform:translate(-50%,-50%);
  font-family:"Baloo 2",sans-serif;font-weight:800;font-size:1.5rem;color:#5b82bd;}
.die.rolling{animation:diceroll .5s ease infinite;}
@keyframes diceroll{0%,100%{transform:rotate(-8deg) translateY(0);}50%{transform:rotate(9deg) translateY(-8px);}}
.roll-btn{width:100%;padding:14px;border-radius:14px;background:var(--todo);color:#fff;
  font-weight:900;font-size:1rem;}
.roll-btn:disabled{background:var(--line);color:var(--ink-soft);}
.msg{font-size:.85rem;font-weight:700;color:var(--ink-soft);margin-top:10px;min-height:1.3em;}
.round{font-size:.78rem;color:var(--ink-soft);font-weight:700;margin-bottom:8px;}

/* 格子上的房子 */
.mark{position:absolute;transform:translate(-50%,-50%);z-index:4;text-align:center;pointer-events:none;}
.mark .own{display:block;width:14px;height:14px;border-radius:50%;border:2px solid #fff;
  margin:0 auto;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.mark .bd{display:flex;gap:1px;justify-content:center;margin-top:1px;}
.mark .bd img{width:11px;height:11px;}

/* 彈窗 */
.overlay{position:fixed;inset:0;background:rgba(107,74,50,.45);display:none;
  align-items:center;justify-content:center;padding:20px;z-index:50;}
.overlay.show{display:flex;}
.pop{background:var(--card);border-radius:20px;padding:20px;width:100%;max-width:340px;text-align:center;
  box-shadow:0 20px 44px rgba(107,74,50,.3);animation:popin .25s ease;}
@keyframes popin{from{opacity:0;transform:translateY(16px) scale(.96);}to{opacity:1;transform:none;}}
.pop .pt{font-size:1.1rem;font-weight:900;margin-bottom:4px;}
.pop .pg{font-size:.78rem;color:var(--ink-soft);font-weight:700;margin-bottom:12px;}
.pop .pprice{font-size:1.6rem;font-weight:800;color:var(--todo);font-family:"Baloo 2",sans-serif;margin-bottom:6px;}
.pop .pnote{font-size:.85rem;line-height:1.6;margin-bottom:14px;}
.pop .btns{display:flex;gap:9px;}
.pop .btns button{flex:1;padding:12px;border-radius:12px;font-weight:800;font-size:.9rem;}
.pop .yes{background:var(--todo);color:#fff;}
.pop .no{background:var(--paper);border:1.5px solid var(--line);color:var(--ink);}
.pop .yes:disabled{background:var(--line);color:var(--ink-soft);}
.pop .bigimg{width:74px;margin:0 auto 8px;display:block;}
.cardimg{width:150px;display:block;margin:10px auto;border-radius:10px;cursor:pointer;
  box-shadow:0 6px 16px rgba(107,74,50,.24);transition:transform .22s ease;}
.cardimg.flip:hover{transform:translateY(-4px);}
.cardimg.flipping{transform:rotateY(90deg) scale(.9);}
.pl .badge{font-size:.65rem;font-weight:800;color:#fff;background:var(--blue);
  border-radius:99px;padding:0 5px;margin-left:3px;}

.mode-row{display:flex;flex-direction:column;gap:10px;margin-bottom:12px;}
.mode-btn{background:var(--paper);border:2px solid var(--line);border-radius:16px;
  padding:16px;text-align:left;display:flex;align-items:center;gap:12px;flex-wrap:wrap;transition:.15s;}
.mode-btn:active{transform:scale(.97);border-color:var(--todo);}
.mode-btn .me{font-size:2rem;flex-shrink:0;}
.mode-btn .mt{font-weight:900;font-size:.98rem;flex:1;min-width:120px;}
.mode-btn .md{font-size:.75rem;color:var(--ink-soft);font-weight:600;width:100%;padding-left:44px;}
.mode-note{font-size:.8rem;color:var(--ink-soft);font-weight:700;min-height:1.2em;}
.lobby-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.lobby-p{display:flex;align-items:center;gap:10px;background:var(--paper);
  border:1.5px solid var(--line);border-radius:12px;padding:9px 12px;}
.lobby-p img{width:34px;}
.lobby-p .nm{font-weight:800;font-size:.9rem;flex:1;text-align:left;}
.lobby-p .host{font-size:.7rem;background:var(--todo);color:#fff;border-radius:99px;padding:2px 8px;font-weight:800;}
.waiting{font-size:.85rem;color:var(--ink-soft);font-weight:700;padding:14px;}
.watch-note{background:#fceedb;border:1.5px solid var(--todo);border-radius:12px;
  padding:10px;font-size:.82rem;font-weight:700;margin-bottom:10px;text-align:center;}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="title">🎲 倉鼠大富翁</div>
    <button class="back" id="backBtn">← 回去</button>
  </div>

  <!-- 選玩法 -->
  <div class="setup" id="modePick">
    <h2>要怎麼玩？</h2>
    <div class="sub">選一個開始</div>
    <div class="mode-row">
      <button class="mode-btn" id="modeLocal">
        <span class="me">📱</span>
        <span class="mt">一台手機輪流玩</span>
        <span class="md">大家圍在一起，輪流拿手機</span>
      </button>
      <button class="mode-btn" id="modeOnline">
        <span class="me">🌐</span>
        <span class="mt">線上一起玩</span>
        <span class="md">各自用自己的手機，2 人就開始</span>
      </button>
    </div>
    <div class="mode-note" id="modeNote"></div>
  </div>

  <!-- 線上等待室 -->
  <div class="setup" id="lobby" style="display:none;">
    <h2>🌐 線上房間</h2>
    <div class="sub" id="lobbySub">等別人加入…</div>
    <div class="lobby-list" id="lobbyList"></div>
    <div class="pick-label">選你的棋子</div>
    <div class="pawn-pick" id="onlinePawnPick"></div>
    <button class="start-btn" id="lobbyLeave" style="background:var(--paper);border:1.5px solid var(--line);color:var(--ink);">離開房間</button>
  </div>

  <!-- 開始畫面 -->
  <div class="setup" id="setup" style="display:none;">
    <h2>幾個人一起玩？</h2>
    <div class="sub">選人數，再選各自的棋子</div>
    <div class="count-row" id="countRow">
      <button class="count-btn" data-n="2">2 人</button>
      <button class="count-btn" data-n="3">3 人</button>
      <button class="count-btn" data-n="4">4 人</button>
    </div>
    <div class="pick-label" id="pickLabel">先選人數</div>
    <div class="pawn-pick" id="pawnPick"></div>
    <button class="start-btn" id="startBtn" disabled>開始遊戲</button>
  </div>

  <!-- 遊戲畫面 -->
  <div class="game" id="game">

// 量出來的：角落佔 21.9%，中間每格 9.33%，一邊 6 格
const CORNER = 21.9, CELL = 9.33;
function buildSquares(){
  const sq = [];
  const c = CORNER/2;                       // 角落中心
  const cellPos = i => CORNER + (i+0.5)*CELL;  // 第 i 格的中心
  // 左上角 → 順時針
  sq.push({x:c, y:c});                                    // 0 左上
  for(let i=0;i<6;i++) sq.push({x:cellPos(i), y:c});      // 1-6 上排
  sq.push({x:100-c, y:c});                                // 7 右上
  for(let i=0;i<6;i++) sq.push({x:100-c, y:cellPos(i)});  // 8-13 右排
  sq.push({x:100-c, y:100-c});                            // 14 右下
  for(let i=0;i<6;i++) sq.push({x:100-cellPos(i), y:100-c}); // 15-20 下排
  sq.push({x:c, y:100-c});                                // 21 左下
  for(let i=0;i<6;i++) sq.push({x:c, y:100-cellPos(i)});  // 22-27 左排
  return sq;
}

const RENT_MULT = [1, 2, 4, 8, 16];   // 0房 1房 2房 3房 旅館
function rentOf(pos){
  const p = PROPS[pos], o = owners[pos];
  if(!o) return 0;
  let base = Math.round(p.price / 5);
  const lv = houses[pos] || 0;
  if(lv === 0 && ownsWholeGroup(o.player, p.g)) base *= 2;
  return base * RENT_MULT[lv];
}
function ownsWholeGroup(pi, g){
  return Object.keys(PROPS).every(k => PROPS[k].g !== g || (owners[k] && owners[k].player === pi));

/* ---------- 遊戲狀態 ---------- */
let playerCount = 0;
let chosen = [];        // 每個玩家選的棋子編號
let players = [];       // {pawn, pos, money, name}
let turn = 0;
let round = 1;
const MAX_ROUND = 10;
let rolling = false;

const $ = id => document.getElementById(id);


/* ---------- 線上模式 ---------- */
// 登入後才知道我是誰、在哪個群組
onAuthStateChanged(auth, async (user) => {
  if(!user){ $("modeNote").textContent = "要先在「今天的我」登入才能線上玩"; return; }
  me = user.uid;
  try{
    const snap = await getDoc(doc(db,"users",me));
    if(snap.exists()){
      const d = snap.data();
      myName = d.name || user.displayName || "我";
      spaceId = d.spaceId || d.groupId || null;
    }
  }catch(e){}
  if(!spaceId) $("modeNote").textContent = "還沒加入群組，只能一台手機玩";
  else autoOnline();
});

// 從 APP 點「線上一起玩」進來 → 直接開房間
function autoOnline(){
  if(new URLSearchParams(location.search).get("online") === "1"){
    setTimeout(()=>{ const b=$("modeOnline"); if(b) b.click(); }, 600);
  }
}

$("modeLocal").onclick = () => {
  mode = "local";
  $("modePick").style.display = "none";
  $("setup").style.display = "block";
};

$("modeOnline").onclick = async () => {
  if(!me || !spaceId){ $("modeNote").textContent = "要先登入並加入群組才能線上玩 🐹"; return; }
  mode = "online";
  $("modePick").style.display = "none";
  $("lobby").style.display = "block";
  // 看看群組裡有沒有人已經開房間
  const snap = await getDoc(doc(db,"spaces",spaceId));
  const m = snap.exists() ? snap.data().mono : null;
  const fresh = m && (Date.now() - (m.at||0) < 3*3600*1000);
  if(fresh){
    gameId = m.id;                 // 加入現有房間
  }else{
    gameId = "m" + Date.now();     // 自己開一間
    await updateDoc(doc(db,"spaces",spaceId), {
      mono: { id:gameId, host:me, status:"waiting", players:[], turn:0, round:1,
              owners:{}, houses:{}, msg:"", at:Date.now() }
    }).catch(()=>{});
  }
  watchMono();
  renderOnlinePawnPick();
};

$("lobbyLeave").onclick = async () => {
  await leaveOnline();
  location.reload();
};
async function leaveOnline(){
  if(unsubMono) unsubMono();
  if(!spaceId || !gameId) return;
  const snap = await getDoc(doc(db,"spaces",spaceId));
  const m = snap.exists() ? snap.data().mono : null;
  if(m && m.id === gameId){
    const left = (m.players||[]).filter(p=>p.uid !== me);
    if(left.length === 0) await updateDoc(doc(db,"spaces",spaceId), { mono: deleteField() }).catch(()=>{});
    else await updateDoc(doc(db,"spaces",spaceId), { "mono.players": left }).catch(()=>{});
  }
}

// 在等待室選棋子 = 加入房間
function renderOnlinePawnPick(){
  const el = $("onlinePawnPick");
  el.innerHTML = PAWNS.map((src,i)=>{
    const taken = remoteState && (remoteState.players||[]).some(p=>p.pawn===i);
    const mine  = remoteState && (remoteState.players||[]).some(p=>p.pawn===i && p.uid===me);
    return `<button class="pawn-opt ${mine?"taken":""} ${taken&&!mine?"dim":""}" data-i="${i}">
      <img src="${src}" alt=""><span class="tag">${mine?"你":(taken?"別人":"")}</span></button>`;
  }).join("");
  el.querySelectorAll(".pawn-opt").forEach(b=>{
    b.onclick = () => joinWithPawn(+b.dataset.i);
  });
}

async function joinWithPawn(pawnIdx){
  const m = remoteState;
  if(!m) return;
  const list = [...(m.players||[])];
  if(list.some(p=>p.pawn===pawnIdx && p.uid!==me)) return;   // 別人選走了
  const at = list.findIndex(p=>p.uid===me);
  const entry = { uid:me, name:myName, pawn:pawnIdx, pos:0, money:20000, skip:0, reroll:false, doubleNext:false };
  if(at>=0) list[at] = { ...list[at], pawn:pawnIdx };
  else list.push(entry);
  const patch = { "mono.players": list, "mono.at": Date.now() };
  // 兩個人就自動開始
  if(list.length >= 2 && m.status === "waiting") patch["mono.status"] = "playing";
  await updateDoc(doc(db,"spaces",spaceId), patch).catch(()=>{});
}

/* 盯著房間 */
let remoteState = null;
function watchMono(){
  if(unsubMono) unsubMono();
  unsubMono = onSnapshot(doc(db,"spaces",spaceId), (snap) => {
    if(!snap.exists()) return;
    const m = snap.data().mono;
    if(!m || m.id !== gameId) return;
    remoteState = m;
    applyRemote(m);
  });
}

/* 把線上狀態畫出來 */
function applyRemote(m){
  players = (m.players||[]).map(p=>({...p}));
  turn = m.turn || 0;
  round = m.round || 1;
  owners = {}; Object.keys(m.owners||{}).forEach(k=> owners[k] = { player: m.owners[k] });
  houses = { ...(m.houses||{}) };

  if(m.status === "waiting"){
    $("lobby").style.display = "block";
    $("game").classList.remove("show");
    $("lobbySub").textContent = `已經有 ${players.length} 人，再 1 人就開始！`;
    $("lobbyList").innerHTML = players.length
      ? players.map(p=>`<div class="lobby-p"><img src="${PAWNS[p.pawn]}">
          <span class="nm">${p.name}</span>${p.uid===m.host?'<span class="host">房主</span>':''}</div>`).join("")
      : `<div class="waiting">還沒有人加入，選一隻棋子加入吧！</div>`;
    renderOnlinePawnPick();
    return;
  }

  // 開始玩了
  $("lobby").style.display = "none";
  $("modePick").style.display = "none";
  $("setup").style.display = "none";
  $("game").classList.add("show");
  drawPawns(); drawMarks(); renderPlayers();
  $("roundTxt").textContent = `第 ${round} / ${MAX_ROUND} 回合`;
  const meIdx = players.findIndex(p=>p.uid===me);
  const myTurn = meIdx >= 0 && meIdx === turn;
  $("turnTxt").textContent = m.status === "ended"
    ? m.msg
    : (myTurn ? "輪到你了！🎲" : `輪到 ${players[turn] ? players[turn].name : "?"} 了…`);
  $("msg").textContent = m.msg || "";
  $("rollBtn").style.display = (m.status === "ended") ? "none" : "block";
  $("rollBtn").disabled = !myTurn || rolling;
  // 沒加入的人只能看
  const watch = $("watchNote");
  if(watch) watch.remove();
  if(meIdx < 0){
    const d = document.createElement("div");
    d.className = "watch-note"; d.id = "watchNote";
    d.textContent = "👀 你在觀戰（遊戲已經開始了）";
    $("game").prepend(d);
  }
}

/* 把現在的狀態存回圖書館 */
async function pushState(msg, status){
  if(mode !== "online" || !spaceId) return;
  const ow = {}; Object.keys(owners).forEach(k=> ow[k] = owners[k].player);
  await updateDoc(doc(db,"spaces",spaceId), {
    "mono.players": players.map(p=>({ uid:p.uid, name:p.name, pawn:p.pawn, pos:p.pos,
      money:p.money, skip:p.skip||0, reroll:!!p.reroll, doubleNext:!!p.doubleNext })),
    "mono.turn": turn, "mono.round": round,
    "mono.owners": ow, "mono.houses": houses,
    "mono.msg": msg || "", "mono.at": Date.now(),
    ...(status ? { "mono.status": status } : {})
  }).catch(()=>{});
}
function isMyTurn(){
  if(mode !== "online") return true;
  const i = players.findIndex(p=>p.uid===me);
  return i >= 0 && i === turn;
}

/* ---------- 開始畫面 ---------- */
$("countRow").querySelectorAll(".count-btn").forEach(b=>{
  b.onclick = () => {
    playerCount = +b.dataset.n;
    $("countRow").querySelectorAll(".count-btn").forEach(x=>x.classList.toggle("on", x===b));
    chosen = [];
    renderPawnPick();
  };
});

function renderPawnPick(){
  $("pickLabel").textContent = playerCount
    ? `輪到第 ${chosen.length+1} 位選棋子（共 ${playerCount} 位）`
    : "先選人數";
  const el = $("pawnPick");
  el.innerHTML = PAWNS.map((src,i)=>{
    const who = chosen.indexOf(i);
    const taken = who >= 0;
    return `<button class="pawn-opt ${taken?"taken":""} ${chosen.length>=playerCount&&!taken?"dim":""}" data-i="${i}">
      <img src="${src}" alt="">
      <span class="tag">${taken?`玩家${who+1}`:""}</span>
    </button>`;
  }).join("");
  el.querySelectorAll(".pawn-opt").forEach(b=>{
    b.onclick = () => {
      const i = +b.dataset.i;
      const at = chosen.indexOf(i);
      if(at >= 0){ chosen.splice(at,1); }         // 再點一次取消
      else if(chosen.length < playerCount){ chosen.push(i); }
      renderPawnPick();
    };
  });
  $("startBtn").disabled = !(playerCount && chosen.length === playerCount);
}
renderPawnPick();

$("startBtn").onclick = () => {
  players = chosen.map((p,i)=>({ pawn:p, pos:0, money:20000, name:`玩家${i+1}`, skip:0, reroll:false, doubleNext:false }));
  turn = 0; round = 1;
  $("setup").style.display = "none";
  $("game").classList.add("show");
  drawPawns(); renderPlayers(); updateTurn();
};

/* ---------- 畫棋子 ---------- */
function drawPawns(){
  const wrap = $("boardWrap");
  wrap.querySelectorAll(".pawn").forEach(e=>e.remove());
  players.forEach((p,i)=>{
    const img = document.createElement("img");
    img.className = "pawn";
    img.id = "pawn"+i;
    img.src = PAWNS[p.pawn];
    wrap.appendChild(img);
  });
  players.forEach((p,i)=>placePawn(i));
}
function placePawn(i){
  const el = $("pawn"+i);
  if(!el) return;
  const s = SQUARES[players[i].pos];
  // 同一格有多人時稍微錯開
  const same = players.filter((q,j)=>q.pos===players[i].pos && j<i).length;
  el.style.left = (s.x + same*2.4 - 1.2) + "%";
  el.style.top  = (s.y + same*1.6 - 0.8) + "%";
}

/* ---------- 玩家列 ---------- */
function renderPlayers(){
  $("players").innerHTML = players.map((p,i)=>`
    <div class="pl ${i===turn?"now":""}">
      <img src="${PAWNS[p.pawn]}" alt="">
      <div class="info">
        <div class="nm"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${PCOLORS[i]};margin-right:4px;"></span>${p.name}</div>
        <div class="mn">$${p.money.toLocaleString()}${p.skip?'<span class="badge">😴</span>':''}${p.reroll?'<span class="badge">🍀</span>':''}${p.doubleNext?'<span class="badge">×2</span>':''}</div>
      </div>
    </div>`).join("");
}
function updateTurn(){
  $("roundTxt").textContent = `第 ${round} / ${MAX_ROUND} 回合`;
  $("turnTxt").textContent = `輪到 ${players[turn].name} 了！`;
  renderPlayers();
}




function askReroll(n){
  return new Promise(res => {
    showPop(`<div class="pt">🍀 轉運卡</div>
      <div class="pprice">${n}</div>
      <div class="pnote">你有轉運卡！<br>要重新擲一次嗎？</div>
      <div class="btns">
        <button class="no" id="keep">就這樣</button>
        <button class="yes" id="re">重擲！</button>
      </div>`);
    document.getElementById("keep").onclick = () => { closePop(); res(false); };
    document.getElementById("re").onclick = () => { closePop(); res(true); };
  });

const CARDS = [
  { k:"coin",    t:"金幣獎勵", d:"獲得 $200" },
  { k:"point",   t:"點數獎勵", d:"獲得 50 點，換成 $500" },
  { k:"forward", t:"前進獎勵", d:"向前進 3 格" },
  { k:"back",    t:"後退卡",   d:"向後退 2 格" },
  { k:"double",  t:"雙倍獎勵", d:"下次拿到的錢變兩倍" },
  { k:"rest",    t:"休息卡",   d:"暫停一回合" },
  { k:"luck",    t:"轉運卡",   d:"下次擲骰子可以重擲一次" },
  { k:"chest",   t:"寶箱卡",   d:"打開寶箱，神秘獎勵！" },
  { k:"swap",    t:"交換卡",   d:"跟別人交換位置" },
];

// 抽一張卡（先蓋著，點一下翻開）
function drawCard(){
  return new Promise(resolve => {
    const card = CARDS[Math.floor(Math.random()*CARDS.length)];
    showPop(`<div class="pt">🎁 抽一張卡</div>
      <div class="pnote">點卡片翻開！</div>
      <img class="cardimg flip" id="cardImg" src="${CARD_BACK}">`);
    document.getElementById("cardImg").onclick = async () => {
      const el = document.getElementById("cardImg");
      el.classList.add("flipping");
      await sleep(220);
      el.src = CARD_IMG[card.k];
      el.classList.remove("flipping");
      el.onclick = null;
      await sleep(700);
      await applyCard(card);
      resolve();
    };
  });
}

// 卡片效果
async function applyCard(card){
  const p = players[turn];
  let msg = "", extra = "";
  const gain = n => {
    if(p.doubleNext){ n *= 2; p.doubleNext = false; extra = "（雙倍！）"; }
    p.money += n;
    return n;
  };

  switch(card.k){
    case "coin":  { const n=gain(200);  msg = `拿到 $${n}${extra}`; break; }
    case "point": { const n=gain(500);  msg = `50 點換成 $${n}${extra}`; break; }
    case "chest": {
      const prize = [500,1000,1500,2000,3000][Math.floor(Math.random()*5)];
      const n=gain(prize); msg = `寶箱打開是 $${n}！${extra}`; break;
    }
    case "double": p.doubleNext = true; msg = "下次拿到的錢會變兩倍 ✨"; break;
    case "rest":   p.skip = (p.skip||0) + 1; msg = "下一回合要休息 😴"; break;
    case "luck":   p.reroll = true; msg = "下次擲骰子可以重擲一次 🍀"; break;
    case "forward": {
      for(let i=0;i<3;i++){
        p.pos = (p.pos+1) % TOTAL;
        if(p.pos===0){ p.money += 2000; }
        players.forEach((q,j)=>placePawn(j));
        await sleep(240);
      }
      msg = "向前走了 3 格！";
      renderPlayers(); closePop();
      await sleep(300);
      await landOn(p.pos);      // 走到新格子也要處理
      return;
    }
    case "back": {
      for(let i=0;i<2;i++){
        p.pos = (p.pos-1+TOTAL) % TOTAL;
        players.forEach((q,j)=>placePawn(j));
        await sleep(240);
      }
      msg = "向後退了 2 格 😅";
      renderPlayers(); closePop();
      await sleep(300);
      await landOn(p.pos);
      return;
    }
    case "swap": {
      const others = players.map((q,j)=>j).filter(j=>j!==turn);
      if(!others.length){ msg = "只有你一個人，沒得換 😆"; break; }
      const j = others[Math.floor(Math.random()*others.length)];
      const tmp = p.pos; p.pos = players[j].pos; players[j].pos = tmp;
      players.forEach((q,k)=>placePawn(k));
      msg = `跟 ${players[j].name} 交換位置了！`;
      break;
    }
  }
  renderPlayers();
  return new Promise(res => {
    showPop(`<div class="pt">${card.t}</div>
      <img class="cardimg" src="${CARD_IMG[card.k]}">
      <div class="pnote">${msg}</div>
      <div class="btns"><button class="yes" id="ok">好</button></div>`);
    document.getElementById("ok").onclick = () => {
      closePop();
      pushState(`${p.name} 抽到「${card.t}」`);
      res();
    };
  });
}

/* ---------- 停在格子上會發生什麼事 ---------- */
const PCOLORS = ["#e8a54f","#7fa8dd","#e79aa4","#8aa96a","#b48ad4","#5bc0c0"];

function showPop(inner){
  if(mode === "online" && !isMyTurn()) return;   // 別人的回合不跳彈窗
  document.getElementById("pop").innerHTML = inner;
  document.getElementById("overlay").classList.add("show");
}
function closePop(){ document.getElementById("overlay").classList.remove("show"); }

// 回傳 Promise，等玩家按完按鈕才繼續
function landOn(pos){
  return new Promise(resolve => {
    const p = players[turn];

    // 機會角落 → 抽卡
    if(pos === 21){
      drawCard().then(resolve);
      return;
    }
    // 其他角落
    if(CORNER_SQ[pos]){
      const c = CORNER_SQ[pos];
      if(pos === 7){ p.skip = (p.skip||0) + 1; }   // 監獄：暫停一回合
      showPop(`<div class="pt">${c.emoji} ${c.name}</div>
        <div class="pnote">${c.note}</div>
        <div class="btns"><button class="yes" id="ok">好</button></div>`);
      document.getElementById("ok").onclick = () => { closePop(); renderPlayers(); resolve(); };
      return;
    }
    // 獎勵格 → 抽卡
    if(BONUS_SQ.includes(pos)){
      drawCard().then(resolve);
      return;
    }

    const prop = PROPS[pos];
    const own = owners[pos];

    // 沒人買 → 問要不要買
    if(!own){
      const can = p.money >= prop.price;
      showPop(`<div class="pt">${prop.n}</div>
        <div class="pg">${prop.g}</div>
        <div class="pprice">$${prop.price.toLocaleString()}</div>
        <div class="pnote">${can ? "要買下這塊地嗎？" : "錢不夠買 🥲"}</div>
        <div class="btns">
          <button class="no" id="no">不買</button>
          <button class="yes" id="yes" ${can?"":"disabled"}>買下來</button>
        </div>`);
      document.getElementById("no").onclick = () => { closePop(); resolve(); };
      document.getElementById("yes").onclick = () => {
        p.money -= prop.price;
        owners[pos] = { player: turn };
        houses[pos] = 0;
        closePop(); renderPlayers(); drawMarks();
        pushState(`${p.name} 買下了 ${prop.n}`); resolve();
      };
      return;
    }

    // 自己的地 → 可以蓋房子
    if(own.player === turn){
      const lv = houses[pos] || 0;
      const cost = houseCost(pos);
      const can = p.money >= cost && lv < 4;
      const nextName = lv < 3 ? "蓋一間房子 🏠" : "升級成旅館 🏨";
      showPop(`<div class="pt">${prop.n}</div>
        <div class="pg">${prop.g} ・ 你的地</div>
        <img class="bigimg" src="${lv>=4?HOTEL_IMG:HOUSE_IMG}">
        <div class="pnote">${lv>=4 ? "已經是旅館了，最高級囉 👑"
          : `現在 ${lv} 間房子<br>${nextName} 要 $${cost.toLocaleString()}<br>過路費會變成 $${(Math.round(prop.price/5)*RENT_MULT[lv+1]).toLocaleString()}`}</div>
        <div class="btns">
          <button class="no" id="no">不蓋</button>
          ${lv<4 ? `<button class="yes" id="yes" ${can?"":"disabled"}>${lv<3?"蓋房子":"蓋旅館"}</button>` : ""}
        </div>`);
      document.getElementById("no").onclick = () => { closePop(); resolve(); };
      const y = document.getElementById("yes");
      if(y) y.onclick = () => {
        p.money -= cost;
        houses[pos] = lv + 1;
        closePop(); renderPlayers(); drawMarks();
        pushState(`${p.name} 在 ${prop.n} ${lv<3?"蓋了房子":"蓋了旅館"}`); resolve();
      };
      return;
    }

    // 別人的地 → 付過路費
    const rent = rentOf(pos);
    const boss = players[own.player];
    const pay = Math.min(rent, p.money);
    p.money -= pay;
    boss.money += pay;
    const lv = houses[pos] || 0;
    showPop(`<div class="pt">${prop.n}</div>
      <div class="pg">${boss.name} 的地${lv?` ・ ${lv>=4?"旅館 🏨":lv+" 間房子 🏠"}`:""}</div>
      <div class="pprice">-$${pay.toLocaleString()}</div>
      <div class="pnote">要付過路費給 ${boss.name}！</div>
      <div class="btns"><button class="yes" id="ok">好啦 😭</button></div>`);
    document.getElementById("ok").onclick = () => {
      closePop(); renderPlayers();
      pushState(`${p.name} 付了 $${pay.toLocaleString()} 給 ${boss.name}`);
      resolve();
    };
  });
}

/* 畫出地主記號與房子 */
function drawMarks(){
  const wrap = document.getElementById("boardWrap");
  wrap.querySelectorAll(".mark").forEach(e=>e.remove());
  Object.keys(owners).forEach(k=>{
    const pos = +k, o = owners[pos], s = SQUARES[pos];
    const lv = houses[pos] || 0;
    const d = document.createElement("div");
    d.className = "mark";
    d.style.left = s.x + "%";
    d.style.top = (s.y - 5.5) + "%";
    let bd = "";
    if(lv >= 4) bd = `<img src="${HOTEL_IMG}">`;
    else if(lv > 0) bd = Array(lv).fill(`<img src="${HOUSE_IMG}">`).join("");
    d.innerHTML = `<span class="own" style="background:${PCOLORS[o.player]}"></span>
      ${bd ? `<span class="bd">${bd}</span>` : ""}`;
    wrap.appendChild(d);
  });
}

/* ---------- 擲骰子 ---------- */
$("rollBtn").onclick = async () => {
  if(rolling) return;
  if(!isMyTurn()) return;
  rolling = true;
  $("rollBtn").disabled = true;
  $("msg").textContent = "";
  const die = $("die1");
  die.classList.add("rolling");
  // 轉一下
  for(let i=0;i<8;i++){
    die.querySelector(".val").textContent = 1 + Math.floor(Math.random()*6);
    await sleep(70);
  }
  let n = 1 + Math.floor(Math.random()*6);
  die.querySelector(".val").textContent = n;
  die.classList.remove("rolling");
  await sleep(250);

  // 轉運卡：可以重擲一次
  const pl = players[turn];
  if(pl.reroll){
    pl.reroll = false;
    const again = await askReroll(n);
    if(again){
      die.classList.add("rolling");
      for(let i=0;i<8;i++){ die.querySelector(".val").textContent = 1+Math.floor(Math.random()*6); await sleep(70); }
      n = 1 + Math.floor(Math.random()*6);
      die.querySelector(".val").textContent = n;
      die.classList.remove("rolling");
      await sleep(250);
    }
  }

  // 一格一格走
  const p = players[turn];
  for(let step=0; step<n; step++){
    p.pos = (p.pos + 1) % TOTAL;
    if(p.pos === 0){ p.money += 2000; $("msg").textContent = `${p.name} 經過起點，領 $2000！`; renderPlayers(); }
    players.forEach((q,j)=>placePawn(j));
    await sleep(240);
  }
  await sleep(200);
  await pushState(`${p.name} 擲到 ${n} 點`);
  await landOn(p.pos);
  await sleep(150);

  // 換人（有休息卡的人會跳過）
  let guard = 0;
  do{
    turn++;
    if(turn >= players.length){ turn = 0; round++; }
    if(round > MAX_ROUND) break;
    if(players[turn].skip > 0){
      players[turn].skip--;
      $("msg").textContent = `${players[turn].name} 在休息，跳過這回合 😴`;
      await sleep(900);
    }else break;
  }while(++guard < 20);

  if(round > MAX_ROUND){
    endGame();
  }else{
    updateTurn();
    await pushState("");
    $("rollBtn").disabled = !isMyTurn();
  }
  rolling = false;
};

function endGame(){
  const best = [...players].sort((a,b)=>b.money-a.money)[0];
  const txt = `遊戲結束！🎉 ${best.name} 錢最多，贏了！`;
  if(mode === "online"){ pushState(txt, "ended"); }
  $("turnTxt").textContent = txt;
  $("roundTxt").textContent = "";
  $("rollBtn").textContent = "🔄 再玩一次";
  $("rollBtn").disabled = false;
  $("rollBtn").onclick = () => location.reload();
  renderPlayers();
}

const sleep = ms => new Promise(r=>setTimeout(r,ms));

$("backBtn").onclick = () => {
  if(document.referrer) history.back();
  else location.href = "index.html";
};
</script>
